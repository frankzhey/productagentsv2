<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Speaking Challenge and Scoring - Data Flow</title>
  <desc id="desc">Data flow for topic metadata, audio upload, scoring task, score result, band mapping, website attribution, and monitoring.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 13px; fill: #6a6a6a; }
    .node-title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 12px; fill: #4f4f4f; }
    .label { font-size: 12px; fill: #5a5a5a; }
    .primary { stroke: #5a5a5a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .write { stroke: #5a5a5a; stroke-width: 2; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrow); }
    .control { stroke: #5a5a5a; stroke-width: 1.7; stroke-dasharray: 3 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker>
    <filter id="shadow-soft"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#f8f6f3"/>
  <text x="600" y="38" text-anchor="middle" class="title">Speaking Challenge and Scoring - Data Flow</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">Audio is stored before scoring task creation; website handoff uses source and score bucket, not raw sensitive score.</text>

  <rect x="70" y="115" width="170" height="78" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="155" y="145" text-anchor="middle" class="node-title">User Session</text>
  <text x="155" y="166" text-anchor="middle" class="node-sub">openid + consent state</text>

  <rect x="310" y="115" width="170" height="78" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="395" y="145" text-anchor="middle" class="node-title">Challenge Topic</text>
  <text x="395" y="166" text-anchor="middle" class="node-sub">prompt + metadata</text>

  <rect x="550" y="115" width="170" height="78" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="635" y="145" text-anchor="middle" class="node-title">Audio Payload</text>
  <text x="635" y="166" text-anchor="middle" class="node-sub">duration + file token</text>

  <rect x="790" y="115" width="170" height="78" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="875" y="145" text-anchor="middle" class="node-title">Upload Gateway</text>
  <text x="875" y="166" text-anchor="middle" class="node-sub">validity check</text>

  <rect x="550" y="285" width="170" height="78" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="635" y="315" text-anchor="middle" class="node-title">Object Storage</text>
  <text x="635" y="336" text-anchor="middle" class="node-sub">audio URL + retention</text>

  <rect x="790" y="285" width="170" height="78" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="875" y="315" text-anchor="middle" class="node-title">Scoring Task</text>
  <text x="875" y="336" text-anchor="middle" class="node-sub">taskId + idempotency key</text>

  <rect x="1030" y="285" width="140" height="78" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="1100" y="315" text-anchor="middle" class="node-title">AI Scoring</text>
  <text x="1100" y="336" text-anchor="middle" class="node-sub">score dimensions</text>

  <rect x="790" y="455" width="170" height="78" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="875" y="485" text-anchor="middle" class="node-title">Result Model</text>
  <text x="875" y="506" text-anchor="middle" class="node-sub">band + CEFR + advice</text>

  <rect x="550" y="455" width="170" height="78" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="635" y="485" text-anchor="middle" class="node-title">Scoring DB</text>
  <text x="635" y="506" text-anchor="middle" class="node-sub">status + result state</text>

  <rect x="310" y="455" width="170" height="78" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="395" y="485" text-anchor="middle" class="node-title">Result Page</text>
  <text x="395" y="506" text-anchor="middle" class="node-sub">short polling display</text>

  <rect x="70" y="455" width="170" height="78" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="155" y="485" text-anchor="middle" class="node-title">Website Landing</text>
  <text x="155" y="506" text-anchor="middle" class="node-sub">source + score bucket</text>

  <rect x="310" y="625" width="170" height="78" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="395" y="655" text-anchor="middle" class="node-title">Analytics</text>
  <text x="395" y="676" text-anchor="middle" class="node-sub">K1/K2/K3/K6/K7</text>

  <rect x="790" y="625" width="170" height="78" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="875" y="655" text-anchor="middle" class="node-title">Ops Monitoring</text>
  <text x="875" y="676" text-anchor="middle" class="node-sub">latency + failures</text>

  <path class="primary" d="M240 154 H310"/><text x="265" y="144" class="label">session</text>
  <path class="primary" d="M480 154 H550"/><text x="505" y="144" class="label">prompt context</text>
  <path class="primary" d="M720 154 H790"/><text x="744" y="144" class="label">audio file</text>
  <path class="write" d="M875 193 V245 H635 V285"/><text x="694" y="236" class="label">store audio first</text>
  <path class="control" d="M875 193 V285"/><text x="887" y="242" class="label">create task</text>
  <path class="primary" d="M960 324 H1030"/><text x="980" y="314" class="label">audio URL</text>
  <path class="primary" d="M1100 363 V494 H960"/><text x="1054" y="434" class="label">score result</text>
  <path class="write" d="M875 363 V455"/><text x="889" y="414" class="label">status write</text>
  <path class="write" d="M790 494 H720"/><text x="742" y="484" class="label">persist result</text>
  <path class="primary" d="M550 494 H480"/><text x="500" y="484" class="label">poll result</text>
  <path class="primary" d="M395 533 V580 H155 V533"/><text x="210" y="570" class="label">source + score bucket</text>
  <path class="write" d="M395 533 V625"/><text x="410" y="588" class="label">events</text>
  <path class="write" d="M875 533 V625"/><text x="889" y="588" class="label">trace</text>
  <path class="control" d="M635 363 V455"/><text x="650" y="414" class="label">retention policy</text>

  <rect x="930" y="45" width="230" height="82" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="948" y="67" class="node-title">Legend</text>
  <line x1="948" y1="86" x2="986" y2="86" class="primary"/><text x="996" y="90" class="label">primary data</text>
  <line x1="948" y1="106" x2="986" y2="106" class="write"/><text x="996" y="110" class="label">storage / telemetry write</text>
  <line x1="1090" y1="86" x2="1128" y2="86" class="control"/><text x="1138" y="90" class="label">control</text>
</svg>
