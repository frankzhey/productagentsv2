<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Speaking Challenge and Scoring - Component Diagram</title>
  <desc id="desc">Component ownership and dependencies for mini program speaking challenge, upload, scoring, mapping, website handoff, analytics, and operations.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 13px; fill: #6a6a6a; }
    .group-title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .node-title { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 11.5px; fill: #4f4f4f; }
    .edge { stroke: #5a5a5a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .async { stroke: #5a5a5a; stroke-width: 2; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrow); }
    .label { font-size: 12px; fill: #5a5a5a; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker>
    <filter id="shadow-soft"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#f8f6f3"/>
  <text x="600" y="38" text-anchor="middle" class="title">Speaking Challenge and Scoring - Component Diagram</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">Ownership boundary: Mini program owns lightweight practice; scoring domain owns task/result; website owns paid conversion landing.</text>

  <rect x="50" y="95" width="250" height="550" rx="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.6" stroke-dasharray="8 5"/>
  <text x="75" y="125" class="group-title">Mini Program Surface</text>

  <rect x="340" y="95" width="250" height="550" rx="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.6" stroke-dasharray="8 5"/>
  <text x="365" y="125" class="group-title">Miniapp Backend</text>

  <rect x="630" y="95" width="250" height="550" rx="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.6" stroke-dasharray="8 5"/>
  <text x="655" y="125" class="group-title">AI Assessment Domain</text>

  <rect x="920" y="95" width="230" height="550" rx="18" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.6" stroke-dasharray="8 5"/>
  <text x="945" y="125" class="group-title">Website + Ops</text>

  <rect x="85" y="160" width="180" height="65" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="175" y="185" text-anchor="middle" class="node-title">Challenge Entry</text><text x="175" y="205" text-anchor="middle" class="node-sub">home card + topic list</text>
  <rect x="85" y="275" width="180" height="65" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="175" y="300" text-anchor="middle" class="node-title">Recorder</text><text x="175" y="320" text-anchor="middle" class="node-sub">permission + invalid audio</text>
  <rect x="85" y="390" width="180" height="65" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="175" y="415" text-anchor="middle" class="node-title">Result Renderer</text><text x="175" y="435" text-anchor="middle" class="node-sub">polling + recovery actions</text>
  <rect x="85" y="505" width="180" height="65" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="175" y="530" text-anchor="middle" class="node-title">Handoff CTA</text><text x="175" y="550" text-anchor="middle" class="node-sub">source + score bucket</text>

  <rect x="375" y="160" width="180" height="65" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="465" y="185" text-anchor="middle" class="node-title">Challenge BFF</text><text x="465" y="205" text-anchor="middle" class="node-sub">topic + session status</text>
  <rect x="375" y="275" width="180" height="65" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="465" y="300" text-anchor="middle" class="node-title">Upload Gateway</text><text x="465" y="320" text-anchor="middle" class="node-sub">audio token + storage</text>
  <rect x="375" y="390" width="180" height="65" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="465" y="415" text-anchor="middle" class="node-title">Result API</text><text x="465" y="435" text-anchor="middle" class="node-sub">short polling endpoint</text>
  <rect x="375" y="505" width="180" height="65" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="465" y="530" text-anchor="middle" class="node-title">Attribution Adapter</text><text x="465" y="550" text-anchor="middle" class="node-sub">click + arrival events</text>

  <rect x="665" y="160" width="180" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="755" y="185" text-anchor="middle" class="node-title">Scoring Job Service</text><text x="755" y="205" text-anchor="middle" class="node-sub">idempotency + state</text>
  <rect x="665" y="275" width="180" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="755" y="300" text-anchor="middle" class="node-title">AI Scoring Engine</text><text x="755" y="320" text-anchor="middle" class="node-sub">rubric dimensions</text>
  <rect x="665" y="390" width="180" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="755" y="415" text-anchor="middle" class="node-title">Band / CEFR Mapper</text><text x="755" y="435" text-anchor="middle" class="node-sub">fixed mapping config</text>
  <rect x="665" y="505" width="180" height="65" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="755" y="530" text-anchor="middle" class="node-title">Trust Formatter</text><text x="755" y="550" text-anchor="middle" class="node-sub">disclaimer + confidence copy</text>

  <rect x="945" y="160" width="180" height="65" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="1035" y="185" text-anchor="middle" class="node-title">Website Router</text><text x="1035" y="205" text-anchor="middle" class="node-sub">landing matcher</text>
  <rect x="945" y="275" width="180" height="65" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="1035" y="300" text-anchor="middle" class="node-title">Object Storage</text><text x="1035" y="320" text-anchor="middle" class="node-sub">retention policy</text>
  <rect x="945" y="390" width="180" height="65" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="1035" y="415" text-anchor="middle" class="node-title">Analytics Store</text><text x="1035" y="435" text-anchor="middle" class="node-sub">KPI + funnel</text>
  <rect x="945" y="505" width="180" height="65" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow-soft)"/>
  <text x="1035" y="530" text-anchor="middle" class="node-title">Ops Dashboard</text><text x="1035" y="550" text-anchor="middle" class="node-sub">failure + latency</text>

  <path class="edge" d="M265 192 H375"/><text x="295" y="182" class="label">topic API</text>
  <path class="edge" d="M265 307 H375"/><text x="292" y="297" class="label">audio submit</text>
  <path class="edge" d="M555 307 H665 V193"/><text x="588" y="245" class="label">create task</text>
  <path class="async" d="M845 307 H945"/><text x="875" y="297" class="label">audio URL</text>
  <path class="edge" d="M755 340 V390"/><text x="767" y="370" class="label">score</text>
  <path class="edge" d="M755 455 V505"/><text x="767" y="486" class="label">format</text>
  <path class="edge" d="M665 422 H555"/><text x="585" y="412" class="label">result</text>
  <path class="edge" d="M375 422 H265"/><text x="288" y="412" class="label">poll</text>
  <path class="edge" d="M265 537 H375"/><text x="288" y="527" class="label">CTA click</text>
  <path class="edge" d="M555 537 H945 V193"/><text x="655" y="527" class="label">source + bucket</text>
  <path class="async" d="M555 537 H945 V422"/><text x="682" y="554" class="label">funnel event</text>
  <path class="async" d="M845 537 H945 V537"/><text x="872" y="527" class="label">incident signal</text>
  <path class="async" d="M465 340 V390"/><text x="478" y="370" class="label">task status</text>

  <rect x="55" y="675" width="285" height="52" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="74" y1="696" x2="114" y2="696" class="edge"/><text x="124" y="700" class="label">sync API dependency</text>
  <line x1="74" y1="715" x2="114" y2="715" class="async"/><text x="124" y="719" class="label">async write / observability</text>
</svg>
