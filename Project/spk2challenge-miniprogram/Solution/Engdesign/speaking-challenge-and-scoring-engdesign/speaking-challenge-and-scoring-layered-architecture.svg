<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Speaking Challenge and Scoring - Layered Architecture</title>
  <desc id="desc">Claude style layered architecture for mini program speaking challenge, scoring orchestration, result mapping, website handoff, observability, and storage.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 13px; fill: #6a6a6a; }
    .layer { font-size: 14px; font-weight: 700; fill: #6a6a6a; }
    .node-title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .node-sub { font-size: 12px; fill: #4f4f4f; }
    .edge { stroke: #5a5a5a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .edge-dashed { stroke: #5a5a5a; stroke-width: 2; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrow); }
    .label { font-size: 12px; fill: #5a5a5a; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
    <filter id="shadow-soft"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="760" fill="#f8f6f3"/>
  <text x="600" y="38" text-anchor="middle" class="title">Speaking Challenge and Scoring - Layered Architecture</text>
  <text x="600" y="60" text-anchor="middle" class="subtitle">Mini program MVP with short polling, idempotent scoring task creation, safe website handoff, and observable AI scoring</text>

  <text x="40" y="127" class="layer">Client</text>
  <text x="40" y="252" class="layer">Gateway / BFF</text>
  <text x="40" y="377" class="layer">Application</text>
  <text x="40" y="502" class="layer">AI + Content</text>
  <text x="40" y="627" class="layer">Data / Ops</text>

  <rect x="115" y="90" width="170" height="75" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="200" y="120" text-anchor="middle" class="node-title">Mini Program</text>
  <text x="200" y="141" text-anchor="middle" class="node-sub">challenge + recorder</text>

  <rect x="370" y="90" width="170" height="75" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="455" y="120" text-anchor="middle" class="node-title">Result Page</text>
  <text x="455" y="141" text-anchor="middle" class="node-sub">poll + render score</text>

  <rect x="625" y="90" width="170" height="75" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="710" y="120" text-anchor="middle" class="node-title">Website Entry</text>
  <text x="710" y="141" text-anchor="middle" class="node-sub">deep link landing</text>

  <rect x="115" y="215" width="170" height="75" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="200" y="245" text-anchor="middle" class="node-title">Challenge BFF</text>
  <text x="200" y="266" text-anchor="middle" class="node-sub">topic + status API</text>

  <rect x="370" y="215" width="170" height="75" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="455" y="245" text-anchor="middle" class="node-title">Upload Gateway</text>
  <text x="455" y="266" text-anchor="middle" class="node-sub">audio validation</text>

  <rect x="625" y="215" width="170" height="75" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="710" y="245" text-anchor="middle" class="node-title">Website Router</text>
  <text x="710" y="266" text-anchor="middle" class="node-sub">source + bucket</text>

  <rect x="880" y="215" width="170" height="75" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="965" y="245" text-anchor="middle" class="node-title">Identity Context</text>
  <text x="965" y="266" text-anchor="middle" class="node-sub">openid / session</text>

  <rect x="245" y="340" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="332" y="370" text-anchor="middle" class="node-title">Scoring Job</text>
  <text x="332" y="391" text-anchor="middle" class="node-sub">idempotent taskId</text>

  <rect x="505" y="340" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="592" y="370" text-anchor="middle" class="node-title">Result Query</text>
  <text x="592" y="391" text-anchor="middle" class="node-sub">short polling</text>

  <rect x="765" y="340" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="852" y="370" text-anchor="middle" class="node-title">Handoff Builder</text>
  <text x="852" y="391" text-anchor="middle" class="node-sub">source + score bucket</text>

  <rect x="245" y="465" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="332" y="495" text-anchor="middle" class="node-title">AI Scoring</text>
  <text x="332" y="516" text-anchor="middle" class="node-sub">dimensions + score</text>

  <rect x="505" y="465" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="592" y="495" text-anchor="middle" class="node-title">Band / CEFR</text>
  <text x="592" y="516" text-anchor="middle" class="node-sub">mapping + disclaimer</text>

  <rect x="765" y="465" width="175" height="75" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="852" y="495" text-anchor="middle" class="node-title">Content Rules</text>
  <text x="852" y="516" text-anchor="middle" class="node-sub">advice templates</text>

  <rect x="180" y="590" width="170" height="75" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="265" y="620" text-anchor="middle" class="node-title">Object Storage</text>
  <text x="265" y="641" text-anchor="middle" class="node-sub">audio lifecycle</text>

  <rect x="430" y="590" width="170" height="75" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="515" y="620" text-anchor="middle" class="node-title">Scoring DB</text>
  <text x="515" y="641" text-anchor="middle" class="node-sub">task + result state</text>

  <rect x="680" y="590" width="170" height="75" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="765" y="620" text-anchor="middle" class="node-title">Analytics</text>
  <text x="765" y="641" text-anchor="middle" class="node-sub">KPI + attribution</text>

  <rect x="930" y="590" width="170" height="75" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.2" filter="url(#shadow-soft)"/>
  <text x="1015" y="620" text-anchor="middle" class="node-title">Monitoring</text>
  <text x="1015" y="641" text-anchor="middle" class="node-sub">latency + failure</text>

  <path class="edge" d="M200 165 V215"/><text x="212" y="192" class="label">load topic</text>
  <path class="edge" d="M285 253 H370"/><text x="320" y="243" class="label">submit audio</text>
  <path class="edge" d="M455 290 V340 H332"/><text x="415" y="321" class="label">create task</text>
  <path class="edge" d="M332 415 V465"/><text x="345" y="444" class="label">score job</text>
  <path class="edge" d="M420 503 H505"/><text x="456" y="492" class="label">raw score</text>
  <path class="edge" d="M592 465 V415"/><text x="603" y="444" class="label">result model</text>
  <path class="edge" d="M592 340 V165 H455"/><text x="526" y="179" class="label">poll result</text>
  <path class="edge" d="M680 503 H765"/><text x="712" y="492" class="label">explain</text>
  <path class="edge" d="M540 128 H625"/><text x="572" y="118" class="label">CTA</text>
  <path class="edge" d="M710 165 V215"/><text x="723" y="192" class="label">handoff</text>
  <path class="edge" d="M852 340 V290 H710"/><text x="792" y="321" class="label">safe params</text>
  <path class="edge-dashed" d="M455 290 V590 H265"/><text x="305" y="576" class="label">store audio</text>
  <path class="edge-dashed" d="M332 415 V590 H515"/><text x="420" y="576" class="label">state</text>
  <path class="edge-dashed" d="M852 415 V590 H765"/><text x="806" y="576" class="label">events</text>
  <path class="edge-dashed" d="M1015 590 V380 H940"/><text x="1018" y="482" class="label">trace</text>

  <rect x="920" y="35" width="235" height="58" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="938" y1="58" x2="980" y2="58" class="edge"/>
  <text x="990" y="62" class="label">sync request / polling</text>
  <line x1="938" y1="78" x2="980" y2="78" class="edge-dashed"/>
  <text x="990" y="82" class="label">write / telemetry</text>
</svg>
